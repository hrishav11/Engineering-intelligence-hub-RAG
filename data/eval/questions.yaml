# Eval set for the Engineering Intelligence Hub (Apache Airflow corpus).
#
# Each entry:
#   id           — short stable identifier
#   question     — the user-facing query
#   category     — factual | where_is | conceptual | multi_hop
#   expected_paths
#                — list of file-path substrings. A retrieval HIT is when ANY
#                  returned chunk's `source_path` contains ANY of these.
#   expected_symbols (optional)
#                — list of substrings; stricter — must match `symbol` metadata.
#   notes        — free-text rationale for why this question is interesting
#
# Goals when adding questions: spread across categories, vary difficulty,
# include both "easy doc lookup" and "hard implementation hunt" cases.

- id: gcs_upload_large_files
  question: "How does GCSHook.upload handle chunked uploads for large files?"
  category: where_is
  expected_paths:
    - providers/google/src/airflow/providers/google/cloud/hooks/gcs.py
  expected_symbols:
    - GCSHook.upload
  notes: |
    Week 1+2 both struggled here — siblings and tests outranked the real method.
    Symbol injection in Week 2.5 fixed it. Canonical regression test.

